<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For E 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #fff5f7; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #4a4a4a; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4); max-width: 380px; width: 90%; text-align: center; border: 2px solid #ffde00; }
        .polaroid { background: white; padding: 15px 15px 45px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; border: 1px solid #eee; transform: rotate(-2deg); transition: 0.3s; }
        .plushie-frame { width: 100%; height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 5px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #ff4d6d; font-size: 1.6rem; margin-bottom: 10px; }
        #msg { font-size: 1rem; line-height: 1.5; color: #666; min-height: 60px; }
        .countdown-box { margin-top: 25px; font-size: 0.8rem; letter-spacing: 2px; color: #ff85a1; font-weight: bold; text-transform: uppercase; }
        .timezone-note { font-size: 0.7rem; color: #bbb; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="header">Your Daily Friend 🧸</h1>
    <p id="msg">Checking the calendar...</p>
    <div class="polaroid">
        <div class="plushie-frame">
            <img id="plushie-img" src="" alt="Plushie">
        </div>
    </div>
    <div class="countdown-box" id="countdown">Calculating...</div>
    <div class="timezone-note">Sending love from 🇮🇳 to 🇨🇦</div>
</div>

<script>
    const schedule = {
        "3-31": { 
            name: "Waddleton", 
            msg: "Meet Waddleton! Just letting you know how good you are and that you deserve the cutest birthday wishes ever. 🐧✨", 
            img: "https://nintendosoup.com/wp-content/uploads/2022/01/kirbycafejapan-waddledeeplushL-productimg-1.jpeg" 
        },
        "4-1": { 
            name: "Cuddleton", 
            msg: "Cuddleton is here to remind you that even from across the ocean, you're always on my mind. 🧸💖", 
            img: "https://files.gifts.ru/reviewer/tb/86/22059.60_21_500.jpg"
        },
        "4-14": { 
            name: "Birthday Squad", 
            msg: "HAPPY BIRTHDAY E! The whole squad is finally here for you! 🎉", 
            img: "https://images.unsplash.com/photo-1534653299134-96a171b61581?w=600" 
        }
    };

    function updateDisplay() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const key = `${m}-${d}`;
        const data = schedule[key] || { msg: "Your next friend is still traveling! Check back tomorrow morning.", img: "https://via.placeholder.com/300?text=Next+Plushie+Coming+Soon" };

        document.getElementById('plushie-img').src = data.img;
        document.getElementById('msg').innerText = data.msg;

        if (m === 4 && d === 14) {
            document.getElementById('header').innerText = "HAPPY BIRTHDAY, E! 🎉";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        const bday = new Date(2026, 3, 14);
        const diff = bday - now;
        if (diff > 0) {
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = `✨ ${days} DAYS UNTIL THE SURPRISE ✨`;
        } else {
            document.getElementById('countdown').innerText = "THE CELEBRATION HAS BEGUN!";
        }
    }
    updateDisplay();
</script>
</body>
</html>
