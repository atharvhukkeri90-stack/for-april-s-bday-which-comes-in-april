<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For E 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #fff5f7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #4a4a4a; overflow-x: hidden; }
        .bouquet { position: fixed; bottom: 20px; right: 20px; font-size: 3.5rem; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); cursor: pointer; transition: 0.3s; z-index: 100; user-select: none; }
        .bouquet:hover { transform: scale(1.2) rotate(10deg); }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4); max-width: 380px; width: 90%; text-align: center; border: 2px solid #ffde00; position: relative; }
        .polaroid { background: white; padding: 15px 15px 45px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; border: 1px solid #eee; transform: rotate(-2deg); }
        .media-frame { width: 100%; height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 5px; overflow: hidden; }
        img, video { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #ff4d6d; font-size: 1.6rem; margin-bottom: 10px; }
        #msg { font-size: 1rem; line-height: 1.5; color: #666; min-height: 60px; font-style: italic; }
        .countdown-box { margin-top: 25px; font-size: 0.8rem; letter-spacing: 2px; color: #ff85a1; font-weight: bold; text-transform: uppercase; border-top: 1px dashed #ffd1dc; padding-top: 15px; }
        .timezone-note { font-size: 0.7rem; color: #bbb; margin-top: 10px; }
    </style>
</head>
<body>

<div class="bouquet" onclick="addMoreFlowers()">💐</div>

<div class="card">
    <h1 id="header">Your Daily Friend 🧸</h1>
    <p id="msg">Thinking of you...</p>
    <div class="polaroid">
        <div class="media-frame" id="media-container">
            </div>
    </div>
    <div class="countdown-box" id="countdown">Calculating...</div>
    <div class="timezone-note">Sending love from 🇮🇳 to 🇨🇦</div>
</div>

    <script>
    const schedule = {
        "4-1":  { name: "Cuddleton", msg: "Cuddleton is here! Just a reminder that even from across the ocean, you're always on my mind. 🧸💖", img: "cuddleton.webp" },
        "4-2":  { name: "Fuggler", msg: "Cuddleton is napping, so he sent this chaotic Fuggler to guard the site. 12 days to go! 👹✨", img: "fuggler.webp" },
        "4-3":  { name: "Waddleton Jr", msg: "Waddleton Jr traveled all the way from the North Pole just to wish you a great day. 🐧❄️", img: "waddleton.webp" },
        "4-4":  { name: "Pikachu!", msg: "Pika-Pika! A wild birthday wish appeared! ⚡🎈", img: "pikachu.webp" },
        
        // --- CATCHING UP FROM THE EXAM BREAK ---
        "4-10": { name: "B-Day Cat", msg: "Exams are over and the countdown is BACK! This cat is getting the party hats ready. 🐱🎂", img: "cat.webp" },
        "4-11": { name: "Star Plush", msg: "You're a star in every time zone. Shine bright today! ⭐", img: "star.webp" },
        "4-12": { name: "Highland Cow", msg: "The fluffiest friend for the final countdown. 2 days left! 🐮☁️", img: "cow.webp" },
        "4-13": { name: "Mystery Box", msg: "The big surprise is arriving tomorrow... are you ready? 🎁✨", img: "box.webp" },
        "4-14": { name: "E-Bear Reveal", msg: "HAPPY BIRTHDAY E! You deserve all the love in the world. 🎉🎈", video: "ebear.mp4" }
    };

    function addMoreFlowers() {
        const now = new Date();
        const day = now.getDate();
        // The grandeur is now massive because we are so close!
        const count = Math.min(day * 20, 400); 
        const size = 1.0 + (day / 10); 

        confetti({
            particleCount: count,
            spread: 90,
            scalar: size,
            origin: { x: 0.9, y: 0.9 },
            colors: ['#ff85a1', '#fbb1bd', '#ffde00', '#ff4d6d']
        });
    }

    function updateDisplay() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const key = m + "-" + d;
        
        const data = schedule[key] || schedule["4-10"]; 

        const container = document.getElementById('media-container');

        if (m === 4 && d === 14) {
            document.getElementById('header').innerText = "HAPPY BIRTHDAY, E! 🎉";
            container.innerHTML = `<video id="bdayVideo" controls autoplay loop style="width:100%; height:100%; object-fit:cover;"><source src="${data.video}" type="video/mp4"></video>`;
            var end = Date.now() + (15 * 1000);
            (function frame() {
              confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0, y: 0.8 }, scalar: 2, colors: ['#ff4d6d', '#ffde00'] });
              confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1, y: 0.8 }, scalar: 2, colors: ['#ff4d6d', '#ffde00'] });
              if (Date.now() < end) requestAnimationFrame(frame);
            }());
        } else {
            container.innerHTML = `<img src="${data.img}" alt="Daily Friend" onerror="this.src='https://via.placeholder.com/300?text=Uploading+Today's+Friend...'">`;
        }

        document.getElementById('msg').innerText = data.msg;

        const bdayDate = new Date(2026, 3, 14);
        const diff = bdayDate - now;
        const countdownElement = document.getElementById('countdown');
        
        if (diff > 0) {
            const daysLeft = Math.ceil(diff / (1000 * 60 * 60 * 24));
            countdownElement.innerText = "✨ " + daysLeft + " DAYS UNTIL THE SURPRISE ✨";
        } else {
            countdownElement.innerText = "IT'S FINALLY YOUR DAY! 🎂";
        }
    }

    window.onload = updateDisplay;
</script>
