<html lang="en">
<head>

        .polaroid { background: white; padding: 15px 15px 45px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; border: 1px solid #eee; transform: rotate(-2deg); }
        .media-frame { width: 100%; height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 5px; overflow: hidden; }

        h1 { color: #ff4d6d; font-size: 1.6rem; margin-bottom: 10px; }
        #msg { font-size: 1rem; line-height: 1.5; color: #666; min-height: 60px; font-style: italic; }
        .countdown-box { margin-top: 25px; font-size: 0.8rem; letter-spacing: 2px; color: #ff85a1; font-weight: bold; text-transform: uppercase; border-top: 1px dashed #ffd1dc; padding-top: 15px; }
        .timezone-note { font-size: 0.7rem; color: #bbb; margin-top: 10px; }
    </style>
</head>

    function addMoreFlowers() {

        const day = now.getDate();

        const count = Math.min(day * 10, 250); 
        const size = 0.8 + (day / 10); 

        confetti({
            particleCount: count,
            spread: 70 + (day * 2),
            scalar: size,
            origin: { x: 0.9, y: 0.9 },
            colors: ['#ff85a1', '#fbb1bd', '#ffde00', '#ff4d6d']
        });
    }
