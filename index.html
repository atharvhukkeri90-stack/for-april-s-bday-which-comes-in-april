<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Ekam 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #fff5f7; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #4a4a4a; overflow: hidden; position: relative; }
        .bouquet { position: fixed; bottom: 20px; right: 20px; font-size: 3.5rem; cursor: pointer; z-index: 100; transition: 0.3s; user-select: none; }
        .bouquet:hover { transform: scale(1.2); }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4); max-width: 380px; width: 90%; text-align: center; border: 2px solid #ffde00; position: relative; z-index: 10; }
        .polaroid { background: white; padding: 15px 15px 45px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; border: 1px solid #eee; transform: rotate(-2deg); cursor: pointer; }
        .media-frame { width: 100%; height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 5px; overflow: hidden; }
        img, video { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #ff4d6d; font-size: 1.6rem; }
        #msg { font-size: 1rem; line-height: 1.5; color: #666; font-style: italic; min-height: 60px; }
        .countdown-box { margin-top: 25px; font-size: 0.8rem; letter-spacing: 2px; color: #ff85a1; font-weight: bold; text-transform: uppercase; border-top: 1px dashed #ffd1dc; padding-top: 15px; }
        
        /* Teaser Tongue Animation */
        #teaser-tongue { position: fixed; font-size: 5rem; pointer-events: none; opacity: 0; z-index: 200; transform: translate(-50%, -50%); transition: opacity 0.2s; }
    </style>
</head>
<body>

<div class="bouquet" onclick="addMoreFlowers()">💐</div>
<div id="teaser-tongue">👅</div>

<div class="card">
    <h1 id="header">Your Daily Friend 🧸</h1>
    <p id="msg">Thinking of you...</p>
    <div class="polaroid" onclick="handleMediaClick()">
        <div class="media-frame" id="media-container"></div>
    </div>
    

<script>
    const schedule = {
        "4-13": { msg: "The final box... Click it if you dare! 🎁✨", img: "box.webp" },
        "4-14": { msg: "HAPPY BIRTHDAY EKAM!! 🎉🎈", video: "ebear.mp4" }
    };

    function addMoreFlowers() {
        const day = new Date().getDate();
        confetti({
            particleCount: Math.min(day * 20, 300),
            spread: 90,
            scalar: 1.5,
            origin: { x: 0.9, y: 0.9 },
            colors: ['#ff85a1', '#ffde00', '#ff4d6d']
        });
    }

    function handleMediaClick() {
        const now = new Date();
        if (now.getMonth() === 3 && now.getDate() === 13) {
            activateTease();
        }
    }

    function activateTease() {
        const tongue = document.getElementById('teaser-tongue');
        tongue.style.opacity = '1';
        document.onmousemove = (e) => {
            tongue.style.left = e.clientX + 'px';
            tongue.style.top = e.clientY + 'px';
        };
        setTimeout(() => {
            tongue.style.opacity = '0';
            document.onmousemove = null;
        }, 5000);
    }

    function updateDisplay() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const key = m + "-" + d;
        const data = schedule[key] || schedule["4-13"];

        const container = document.getElementById('media-container');
        if (m === 4 && d === 14) {
            document.getElementById('header').innerText = "HAPPY BIRTHDAY EKAM!! IYLSM!!! 🎉";
            container.innerHTML = `<video autoplay loop controls><source src="${data.video}" type="video/mp4"></video>`;
            // Auto Birthday Confetti
            var end = Date.now() + 10000;
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, scalar: 2 });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, scalar: 2 });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        } else {
            container.innerHTML = `<img src="${data.img}" onerror="this.src='https://via.placeholder.com/300?text=Mystery+Box'">`;
        }
        document.getElementById('msg').innerText = data.msg;
    }

    window.onload = updateDisplay;
</script>
    <div style="position: fixed; bottom: 5px; left: 8px; font-size: 8px; color: rgba(0,0,0,0.15); font-family: sans-serif; display: flex; align-items: center; gap: 3px;">
    views: <img src="https://hitwebcounter.com/counter/counter.php?page=YOUR_UNIQUE_ID&style=0006&nbdigits=3&type=page&initCount=0" style="height: 10px; width: auto; opacity: 0.4; filter: grayscale(100%);" />
</div>
</body>
</html>
