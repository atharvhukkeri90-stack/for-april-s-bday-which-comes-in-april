<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Birthday Journey 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #fff5f7; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4); max-width: 380px; width: 90%; text-align: center; border: 2px solid #ffde00; }
        .polaroid { background: white; padding: 15px 15px 45px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; border: 1px solid #eee; transition: opacity 1s ease-in-out; }
        .media-frame { width: 100%; height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 5px; overflow: hidden; }
        img, video { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #ff4d6d; font-size: 1.6rem; margin: 0; }
        #msg { font-size: 1rem; line-height: 1.5; color: #666; font-style: italic; min-height: 80px; margin-top: 15px; }
        .date-label { font-size: 0.8rem; font-weight: bold; color: #ff85a1; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card">
    <div id="date-text" class="date-label">April 1st</div>
    <h1 id="header">The Countdown Story</h1>
    <div class="polaroid" id="fade-target">
        <div class="media-frame" id="media-container"></div>
    </div>
    <p id="msg">Loading memories...</p>
</div>

<script>
    const memories = [
        { date: "April 1st", img: "cuddleton.webp", msg: "It all started with Cuddleton... a little reminder from across the ocean. 🧸" },
        { date: "April 2nd", img: "fuggler.webp", msg: "Then things got a little chaotic with the Fuggler guarding the site! 👹" },
        { date: "April 3rd", img: "waddleton.webp", msg: "Waddleton Jr waddled in to keep the vibes chilly and cute. 🐧" },
        { date: "April 4th", img: "pikachu.webp", msg: "A wild Pikachu appeared to give the countdown some spark! ⚡" },
        { date: "April 10th", img: "cat.webp", msg: "After the exam grind, the B-Day Cat brought the party hats back out. 🐱" },
        { date: "April 13th", img: "box.webp", msg: "The final Mystery Box... and that teasing tongue! 🎁👅" },
        { date: "April 14th", video: "ebear.mp4", msg: "And finally... HAPPY BIRTHDAY EKAM!! The best day for the best person. 🎉🎂" }
    ];

    let index = 0;
    const container = document.getElementById('media-container');
    const msg = document.getElementById('msg');
    const dateText = document.getElementById('date-text');
    const polaroid = document.getElementById('fade-target');

    function showNext() {
        if (index >= memories.length) return;

        const current = memories[index];
        polaroid.style.opacity = 0; // Fade out

        setTimeout(() => {
            dateText.innerText = current.date;
            msg.innerText = current.msg;
            
            if (current.video) {
                container.innerHTML = `<video autoplay loop muted style="width:100%; height:100%;"><source src="${current.video}" type="video/mp4"></video>`;
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                container.innerHTML = `<img src="${current.img}">`;
            }

            polaroid.style.opacity = 1; // Fade in
            index++;
            
            // Wait 4 seconds per slide, except the last one which stays
            if (index < memories.length) {
                setTimeout(showNext, 4000);
            }
        }, 1000);
    }

    // Start the show!
    window.onload = () => {
        setTimeout(showNext, 1000);
    };
</script>
</body>
</html>
