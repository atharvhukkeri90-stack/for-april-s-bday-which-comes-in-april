<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For E 🧸</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        body { background-color: #fff5f7; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #4a4a4a; overflow-x: hidden; }
        .bouquet { position: fixed; bottom: 20px; right: 20px; font-size: 3rem; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1)); cursor: pointer; transition: 0.3s; z-index: 100; }
        .bouquet:hover { transform: scale(1.2) rotate(10deg); }
        .card { background: white; padding: 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4); max-width: 380px; width: 90%; text-align: center; border: 2px solid #ffde00; position: relative; }
        .polaroid { background: white; padding: 15px 15px 45px 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin: 20px auto; border: 1px solid #eee; transform: rotate(-2deg); }
        .plushie-frame { width: 100%; height: 300px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; border-radius: 5px; overflow: hidden; }
        img { width: 100%; height: 100%; object-fit: cover; }
        h1 { color: #ff4d6d; font-size: 1.6rem; margin-bottom: 10px; }
        #msg { font-size: 1rem; line-height: 1.5; color: #666; min-height: 60px; }
        .countdown-box { margin-top: 25px; font-size: 0.8rem; letter-spacing: 2px; color: #ff85a1; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="bouquet" onclick="addMoreFlowers()">💐</div>

<div class="card">
    <h1 id="header">Your Daily Friend 🧸</h1>
    <p id="msg">Loading your surprise...</p>
    <div class="polaroid">
        <div class="plushie-frame">
            <img id="plushie-img" src="https://via.placeholder.com/300?text=Loading..." alt="Plushie">
        </div>
    </div>
    <div id="countdown" class="countdown-box">Calculating...</div>
</div>

<script>
    const schedule = {
        "3-31": { name: "Waddleton", msg: "...", img: "waddleton.jpg" }, // Upload waddleton too if you have it!
        "4-1":  { name: "Cuddleton", msg: "Cuddleton is here! Just a reminder that even from across the ocean, you're always on my mind. 🧸💖", img: "22059.60_2_500.webp" },
        "4-2":  { name: "Fuggler", msg: "Cuddleton is napping, so he sent this chaotic Fuggler to guard the site. 12 days to go! 👹✨", img: "fuggler.webp" },
        "4-14": { name: "E-Bear Reveal", msg: "HAPPY BIRTHDAY E! You deserve all the love in the world. 🎉🎈", img: "fuggler.webp" },
    };

    function addMoreFlowers() {
        function addMoreFlowers() {
        const now = new Date();
        const day = now.getDate();
        
        // As the date goes from 2 to 14, the "Grandeur" increases!
        // We calculate a multiplier based on the day of April
        const intensity = Math.min(day * 15, 300); // Caps at 300 particles for the 14th
        const scale = 1 + (day / 14); // Confetti pieces get physically bigger too!

        confetti({ 
            particleCount: intensity, 
            spread: 50 + (day * 5), // Spread gets wider every day
            scalar: scale, 
            colors: ['#ff85a1', '#fbb1bd', '#ffde00', '#ff4d6d'], 
            origin: { x: 0.9, y: 0.9 } 
        });
    }

    function updateDisplay() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const key = `${m}-${d}`;
        const data = schedule[key] || { msg: "The squad is taking a break! Check back tomorrow.", img: "loading.webp" };

        const imgElement = document.getElementById('plushie-img');
        imgElement.src = data.img;
        document.getElementById('msg').innerText = data.msg;

        // BIRTHDAY SPECIAL: Automatic Grand Confetti Cannon
        if (m === 4 && d === 14) {
            document.getElementById('header').innerText = "HAPPY BIRTHDAY, E! 🎉";
            
            // This creates a continuous "rain" of grand confetti for the big day
            var end = Date.now() + (15 * 1000);
            var colors = ['#ff4d6d', '#ffde00', '#ffffff'];

            (function frame() {
              confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: colors, scalar: 2 });
              confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: colors, scalar: 2 });

              if (Date.now() < end) {
                requestAnimationFrame(frame);
              }
            }());
        }

        const bday = new Date(2026, 3, 14);
        const diff = bday - now;
        if (diff > 0) {
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = `✨ ${days} DAYS UNTIL THE SURPRISE ✨`;
        } else {
            document.getElementById('countdown').innerText = "IT'S YOUR DAY! 🎉";
        }
    }    }

    function updateDisplay() {
        const now = new Date();
        const m = now.getMonth() + 1;
        const d = now.getDate();
        const key = `${m}-${d}`;
        const data = schedule[key] || { msg: "The squad is taking a break! Check back tomorrow.", img: "https://via.placeholder.com/300?text=Next+Friend+Coming+Soon" };

        document.getElementById('plushie-img').src = data.img;
        document.getElementById('msg').innerText = data.msg;

        if (m === 4 && d === 14) {
            document.getElementById('header').innerText = "HAPPY BIRTHDAY, E! 🎉";
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        const bday = new Date(2026, 3, 14);
        const diff = bday - now;
        if (diff > 0) {
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            document.getElementById('countdown').innerText = `✨ ${days} DAYS UNTIL THE SURPRISE ✨`;
        } else {
            document.getElementById('countdown').innerText = "IT'S YOUR DAY! 🎉";
        }
    }
    updateDisplay();
</script>
</body>
</html>
